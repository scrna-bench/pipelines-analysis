name: Build container

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - rv.lock
      - rproject.toml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: scrna-bench/containerize@main
        id: build
        with:
          namespace: scrna-bench
          image-name: pipelines-analysis
          image-tag: ${{ github.ref_name }}

      - run: |
          docker tag ${{ steps.build.outputs.image }} ghcr.io/${{ steps.build.outputs.image }}
          docker push ghcr.io/${{ steps.build.outputs.image }}
